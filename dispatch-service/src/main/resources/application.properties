quarkus.http.port=8080
quarkus.http.test-port=0
%dev.quarkus.test.continuous-testing=disabled

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DISPATCH_DB_URL:jdbc:postgresql://localhost:5432/dispatch}
quarkus.datasource.username=${DISPATCH_DB_USER:dispatch}
quarkus.datasource.password=${DISPATCH_DB_PASS:dispatch}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# Hibernate ORM
quarkus.hibernate-orm.database.default-schema=${dispatch.schema}
quarkus.hibernate-orm.schema-management.strategy=none

# Flyway
quarkus.flyway.migrate-at-start=${DISPATCH_RUN_MIGRATIONS:false}
quarkus.flyway.default-schema=${dispatch.schema}
quarkus.flyway.schemas=${dispatch.schema}
quarkus.flyway.placeholder-replacement=true
quarkus.flyway.placeholders.dispatch-schema=${dispatch.schema}

# Security — lazy auth so /api/auth/** is open without a token
quarkus.http.auth.proactive=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Authorization
quarkus.http.cors.access-control-allow-credentials=true

# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/api-docs
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true

# Application config
dispatch.schema=${DISPATCH_SCHEMA:dispatch}
dispatch.jwt.secret=${JWT_SECRET:change-this-in-production-min-256-bits-secret-key-here}
dispatch.jwt.issuer=dispatch
dispatch.jwt.backoffice-token-expiry-seconds=28800
dispatch.jwt.user-token-expiry-seconds=28800
dispatch.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
dispatch.management.api-key=${MANAGEMENT_API_KEY:change-me-in-production}
dispatch.internal.api-key=${DISPATCH_INTERNAL_API_KEY:change-me-internal-api-key}
dispatch.auth.provider=${AUTH_PROVIDER:native}
dispatch.auth.cognito.region=${COGNITO_REGION:us-east-1}
dispatch.auth.firebase.project-id=

# Health
quarkus.smallrye-health.root-path=/actuator/health

# Test profile
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/dispatch-test
%test.quarkus.datasource.username=dispatch-test
%test.quarkus.datasource.password=dispatch-test
%test.quarkus.flyway.migrate-at-start=true
%test.dispatch.jwt.secret=test-secret-change-in-production-must-be-256-bits-long-key
%test.dispatch.jwt.issuer=dispatch
