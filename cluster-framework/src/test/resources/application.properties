# No datasource configured → Hibernate ORM auto-disabled for framework tests
# (framework uses direct JDBC via HikariCP for all schema operations)
quarkus.datasource.active=false
quarkus.hibernate-orm.active=false

# HTTP
quarkus.http.port=8082
quarkus.http.test-port=0
quarkus.http.auth.proactive=false

# Cluster configuration
cluster.id=test-cluster
cluster.name=Test Cluster
cluster.dispatch-url=http://localhost:8080
cluster.dispatch-internal-api-key=change-me-internal-api-key
cluster.management.api-key=change-me-in-production

# Shard configuration (points to the test database provisioned by DbProvisioner)
cluster.shards.shard-1.jdbc-url=jdbc:postgresql://localhost:5432/cluster-fw-test
cluster.shards.shard-1.username=cluster-fw-test
cluster.shards.shard-1.password=cluster-fw-test
cluster.shards.shard-1.max-pool-size=5
cluster.shards.shard-1.min-idle=1
