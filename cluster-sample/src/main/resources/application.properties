quarkus.application.name=cluster-sample
quarkus.http.port=8081
quarkus.http.test-port=0
quarkus.http.auth.proactive=true

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Authorization
quarkus.http.cors.access-control-allow-credentials=true

# Multi-tenancy via schema routing
quarkus.hibernate-orm.multitenant=SCHEMA
quarkus.hibernate-orm.schema-management.strategy=none

# Main datasource (shard-1 default)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${SHARD1_DB_URL:jdbc:postgresql://localhost:5432/cluster}
quarkus.datasource.username=${SHARD1_DB_USER:cluster}
quarkus.datasource.password=${SHARD1_DB_PASS:cluster}

# Register cluster-framework CDI beans
quarkus.index-dependency.cluster-framework.group-id=org.gsginzburg
quarkus.index-dependency.cluster-framework.artifact-id=cluster-framework

# OpenAPI
quarkus.smallrye-openapi.path=/api-docs
quarkus.swagger-ui.path=/swagger-ui.html

# Cluster configuration
quarkus.flyway.migrate-at-start=false

cluster.id=${CLUSTER_ID:cluster-1}
cluster.name=${CLUSTER_NAME:Sample Cluster 1}
cluster.dispatch-url=${DISPATCH_URL:http://localhost:8080}
cluster.dispatch-internal-api-key=${DISPATCH_INTERNAL_API_KEY:change-me-internal-api-key}
cluster.management.api-key=${MANAGEMENT_API_KEY:change-me-in-production}

cluster.shards.shard-1.jdbc-url=${SHARD1_DB_URL:jdbc:postgresql://localhost:5432/cluster}
cluster.shards.shard-1.username=${SHARD1_DB_USER:cluster}
cluster.shards.shard-1.password=${SHARD1_DB_PASS:cluster}
cluster.shards.shard-1.max-pool-size=20
cluster.shards.shard-1.min-idle=5

# Additional shards can be added as needed, e.g.:
# cluster.shards.shard-2.jdbc-url=${SHARD2_DB_URL}
# cluster.shards.shard-2.username=${SHARD2_DB_USER}
# cluster.shards.shard-2.password=${SHARD2_DB_PASS}
# cluster.shards.shard-2.max-pool-size=20
# cluster.shards.shard-2.min-idle=5

# Path-based tenant injection (disabled by default)
# cluster.path-tenant-injection.enabled=true
# cluster.path-tenant-injection.allowed-roles=BACKOFFICE

# Schema upgrade parallelism: concurrent Flyway migrations per shard (default: 4)
# cluster.schema-upgrade.parallelism-per-shard=4

# Test profile
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/cluster-sample-test
%test.quarkus.datasource.username=cluster-sample-test
%test.quarkus.datasource.password=cluster-sample-test
%test.cluster.shards.shard-1.jdbc-url=jdbc:postgresql://localhost:5432/cluster-sample-test
%test.cluster.shards.shard-1.username=cluster-sample-test
%test.cluster.shards.shard-1.password=cluster-sample-test
