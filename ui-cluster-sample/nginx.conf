server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular app - all routes fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to dispatch service
    location /api-dispatch/ {
        rewrite ^/api-dispatch/(.*)$ /$1 break;
        proxy_pass http://dispatch-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to cluster service
    location /api-cluster/ {
        rewrite ^/api-cluster/(.*)$ /$1 break;
        proxy_pass http://cluster-sample:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
